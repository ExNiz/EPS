<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LeaderPulse — Leaders Experience Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{--bg:#0d0f14;--surface:#151820;--card:#1c2030;--border:#252a3a;--accent:#4f7cff;--accent3:#34d399;--accent4:#fbbf24;--accent5:#a78bfa;--text:#e8eaf0;--muted:#b0bac8;--pos:#34d399;--neg:#ff6b6b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* PASSWORD */
#pw-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 30% 20%,#1a2a5e33 0%,transparent 60%),#0b1220;}
.pw-card{width:100%;max-width:420px;background:#151820;border:1px solid #252a3a;border-radius:20px;padding:44px 40px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5);}
.pw-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px;}
.pw-logo img{height:40px;object-fit:contain;}
.pw-brand{font-family:system-ui,sans-serif;font-size:24px;font-weight:800;color:#f1f5f9;}
.pw-brand span{color:#4f7cff;}
.pw-lock{font-size:32px;margin-bottom:12px;}
.pw-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#b0bac8;margin-bottom:8px;text-align:left;}
.pw-input{width:100%;background:#1c2030;border:1px solid #252a3a;border-radius:10px;padding:14px 18px;color:white;font-size:16px;font-family:system-ui,-apple-system,sans-serif;text-align:center;letter-spacing:.15em;margin-bottom:14px;outline:none;transition:border-color .2s;}
.pw-input:focus{border-color:#4f7cff;}
.pw-btn{width:100%;background:#4f7cff;color:#fff;border:none;border-radius:10px;padding:14px;font-family:system-ui,sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:all .2s;}
.pw-btn:hover{background:#3d6ae0;transform:translateY(-1px);}
.pw-error{color:#ff6b6b;font-size:12px;margin-top:10px;min-height:18px;}
.pw-footer{margin-top:24px;padding-top:16px;border-top:1px solid #1f2937;font-size:11px;color:#6b7080;}

/* LOADING */
#loading{display:none;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:var(--bg);}
.spin{width:32px;height:32px;border:3px solid #252a3a;border-top-color:#4f7cff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* DASHBOARD */
#dashboard{display:none;height:100vh;flex-direction:column;}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:#0a0c10;border-bottom:2px solid var(--accent);flex-shrink:0;}
.app-logo{display:flex;align-items:center;gap:10px;}
.app-logo img{height:30px;object-fit:contain;}
.app-brand{font-family:system-ui,sans-serif;font-size:18px;font-weight:800;color:#fff;}
.app-brand span{color:#4f7cff;}
.header-right{display:flex;align-items:center;gap:8px;}
.hbadge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.hbadge strong{font-family:system-ui,sans-serif;font-size:14px;font-weight:800;}
.tab-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;gap:2px;}
.tab-btn{all:unset;box-sizing:border-box;display:inline-block;border-bottom:3px solid transparent;padding:13px 22px;font-family:system-ui,-apple-system,sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;margin-bottom:-1px;line-height:1;transition:color .18s,background .18s,border-color .18s;}
.tab-btn:hover{color:#e8eaf0;background:rgba(255,255,255,.04);}
.tab-btn.active{color:#fff;border-bottom:3px solid #4f7cff;font-weight:600;background:rgba(79,124,255,.08);}
.page-wrap{flex:1;overflow-y:auto;padding:20px;}
.page{display:none;}
.page.active{display:block;}
.page-header{margin-bottom:18px;}
.page-title{font-family:system-ui,sans-serif;font-size:22px;font-weight:800;}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:16px 0 8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.scroll-y{overflow-x:auto;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:0;}
.stat-tile{border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;border:1px solid var(--border);}
.stat-tile-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;font-weight:600;}
.stat-tile-val{font-family:system-ui,sans-serif;font-size:52px;font-weight:800;line-height:1;}
.stat-tile-sub{font-size:11px;color:var(--muted);margin-top:8px;}
.overall-kpi{background:linear-gradient(135deg,#1c2030,#0f172a);border:1px solid var(--border);border-radius:14px;padding:24px 28px;display:flex;gap:26px;align-items:center;margin-bottom:0;position:relative;overflow:hidden;}
.overall-kpi::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(79,124,255,.12) 0%,transparent 70%);}
.ov-score{font-family:system-ui,sans-serif;font-size:64px;font-weight:800;line-height:1;flex-shrink:0;}
.ov-right{flex:1;}
.ov-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.ov-sum{font-size:12px;color:var(--text);line-height:1.65;}
.sentiment-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin:8px 0;}
.sent-pos{background:var(--pos);}.sent-neu{background:#252a3a;}.sent-neg{background:var(--neg);}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:0;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--accent));}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;}
.kpi-score{font-family:system-ui,sans-serif;font-size:34px;font-weight:800;line-height:1;margin-bottom:2px;}
.kpi-band{font-size:11px;font-weight:600;margin-top:3px;}
.kpi-bar-track{height:4px;background:var(--border);border-radius:2px;margin-top:10px;}
.kpi-bar-fill{height:100%;border-radius:2px;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:5px;}
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{background:var(--surface);color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.cat-pill{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;}
.cat-cb{background:#4f7cff22;color:#4f7cff;}.cat-lt{background:#34d39922;color:#34d399;}.cat-sa{background:#fbbf2422;color:#fbbf24;}.cat-cg{background:#a78bfa22;color:#a78bfa;}.cat-rs{background:#ff6b6b22;color:#ff6b6b;}
.pain-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;border-left:3px solid var(--neg);}
.strength-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;border-left:3px solid var(--pos);}
.evidence-quote{background:var(--surface);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--muted);font-style:italic;margin:4px 0;line-height:1.55;border-left:2px solid var(--accent);}
</style>
</head>

var DB = {};

function $(id){return document.getElementById(id);}
function dv(cls){var e=document.createElement('div');if(cls)e.className=cls;return e;}
function h(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function val(row,col){return(row&&row[col]!=null)?String(row[col]):'';}
function num(row,col){return parseFloat(val(row,col))||0;}
function catCls(cat){if(!cat)return'';var c=cat.toLowerCase();if(c.includes('culture')||c.includes('belong'))return'cat-cb';if(c.includes('leader')||c.includes('trust'))return'cat-lt';if(c.includes('strategy')||c.includes('align'))return'cat-sa';if(c.includes('career')||c.includes('growth'))return'cat-cg';if(c.includes('retention')||c.includes('sustain'))return'cat-rs';return'';}
function scoreColor(v){return v>=75?'var(--pos)':v>=55?'var(--accent4)':'var(--neg)';}
function bandText(v){return v>=80?'Excellent':v>=65?'Good':v>=50?'Fair':'Needs Attention';}
function showTab(name){document.querySelectorAll('.page').forEach(function(p){p.style.display='none';});document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});var pg=$('p-'+name);if(pg)pg.style.display='block';var btn=$('t-'+name);if(btn)btn.classList.add('active');}

function checkPw(){
  var v=$('pw-input').value;
  if(v===PASS){
    $('pw-screen').style.display='none';
    $('loading').style.display='flex';
    setTimeout(loadData,50);
  } else {
    $('pw-error').textContent='Incorrect password. Please try again.';
  }
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});

function loadData(){
  try{
    var binary=atob(EMBEDDED_DATA);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    var wb=XLSX.read(bytes,{type:'array'});
    wb.SheetNames.forEach(function(n){DB[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{defval:''});} );
    buildExec(); buildCategory(); buildPain(); buildStrengths(); buildSuggestions();
    $('loading').style.display='none';
    $('dashboard').style.display='flex';
    $('dashboard').style.flexDirection='column';
    showTab('exec');
  } catch(err){
    $('load-error').textContent='Error: '+err.message;
    $('load-error').style.display='block';
    $('loading').querySelector('.spin').style.display='none';
  }
}


function buildDrillDown(container, catName, detailRows){
  var catRows=detailRows.filter(function(r){return val(r,'Category')===catName;});

  var wrap=dv('');
  wrap.style.cssText='padding:12px 16px;background:var(--bg);border-top:2px solid var(--border);';

  // Group by question
  var byQ={};
  catRows.forEach(function(r){
    var q=val(r,'Question')||val(r,'Original_Question')||'Unknown';
    if(!byQ[q]) byQ[q]=[];
    byQ[q].push(r);
  });

  var questions=Object.keys(byQ);
  if(!questions.length){
    var emp=dv('');emp.style.cssText='color:var(--muted);font-size:12px;padding:8px;';
    emp.textContent='No detailed responses available for this category.';
    container.appendChild(emp);return;
  }

  var hdr=dv('');hdr.style.cssText='font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;';
  hdr.textContent=catName+' — '+catRows.length+' responses across '+questions.length+' questions';
  wrap.appendChild(hdr);

  questions.forEach(function(q){
    var qRows=byQ[q];
    var qBlock=dv('');
    qBlock.style.cssText='margin-bottom:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden;';

    // Question header bar
    var qHead=dv('');
    var pos=qRows.filter(function(r){return val(r,'Sentiment')==='Positive'||val(r,'Polarity')==='Positive';}).length;
    var neg=qRows.filter(function(r){return val(r,'Sentiment')==='Negative'||val(r,'Polarity')==='Negative';}).length;
    var tot=qRows.length||1;
    var posPct=Math.round(pos/tot*100);
    var negPct=Math.round(neg/tot*100);

    qHead.style.cssText='background:var(--surface);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;';
    var qText=dv('');qText.style.cssText='font-size:12px;font-weight:600;color:var(--text);flex:1;line-height:1.4;';qText.textContent=q;
    var qMeta=dv('');qMeta.style.cssText='font-size:10px;white-space:nowrap;display:flex;gap:8px;align-items:center;flex-shrink:0;';

    qBlock.appendChild(rList);
    wrap.appendChild(qBlock);
  });

  container.appendChild(wrap);
}

function buildExec(){
  var pg=$('p-exec'); pg.innerHTML='';
  var sumRows=DB['Overall Summary']||[];
  var effRows=DB['Leader Effectiveness']||[];
  function getF(f){var r=sumRows.find(function(r){return val(r,'Field')===f;});return r?val(r,'Value'):'';}
  var leaders=getF('Leaders Surveyed'),totalResp=getF('Total Responses Analysed');
  var posPct=parseFloat(getF('Positive Sentiment %'))||0,negPct=parseFloat(getF('Negative Sentiment %'))||0,neuPct=parseFloat(getF('Neutral Sentiment %'))||0;
  var ov=parseFloat(getF('Overall Experience Score'))||0;
  var bi=parseFloat(getF('Belonging Index'))||0,si=parseFloat(getF('Strategy Alignment Index'))||0,ci=parseFloat(getF('Career Equity Index'))||0,ri=parseFloat(getF('Retention Effectiveness Index'))||0,te=parseFloat(getF('Team Energy Sentiment'))||0;
  var summary=getF('Overall Survey Summary');
  // Header badges
  var hb=$('hbadges'); hb.innerHTML='';
  function mkBadge(lbl,v,color){var b=dv('hbadge');var s=document.createElement('strong');s.textContent=v;s.style.color=color||'#fff';var t=document.createTextNode(' '+lbl);b.appendChild(s);b.appendChild(t);return b;}
  hb.appendChild(mkBadge('Leaders Surveyed',leaders,'var(--pos)'));
  hb.appendChild(mkBadge('Total Responses',totalResp,'var(--accent)'));
  hb.appendChild(mkBadge('Score',ov.toFixed(1)+'/100',scoreColor(ov)));
  // Page header
  var hdr=dv('page-header');var pt=h('div','page-title');pt.textContent='Executive Overview';var ps=h('div','page-sub');ps.textContent='Leaders Experience Survey — Overall Findings';hdr.appendChild(pt);hdr.appendChild(ps);pg.appendChild(hdr);
  // Stat tiles
  var sLbl=h('div','section-label');sLbl.textContent='Survey Participation';pg.appendChild(sLbl);
  var sRow=dv('stats-row');
  function mkTile(label,value,sub,bg,color){var t=dv('stat-tile');t.style.background=bg;var l=dv('stat-tile-label');l.textContent=label;t.appendChild(l);var v2=dv('stat-tile-val');v2.textContent=value;v2.style.color=color;t.appendChild(v2);var s2=dv('stat-tile-sub');s2.textContent=sub;t.appendChild(s2);return t;}
  sRow.appendChild(mkTile('Leaders Surveyed',leaders,'Unique participants in this survey','linear-gradient(135deg,#0d2a1e,#1c2030)','var(--pos)'));
  sRow.appendChild(mkTile('Total Responses',totalResp,'Responses analysed across all categories','linear-gradient(135deg,#0d1a3a,#1c2030)','var(--accent)'));
  pg.appendChild(sRow);
  // Overall KPI
  var ovLbl=h('div','section-label');ovLbl.textContent='Overall Experience Score';pg.appendChild(ovLbl);
  var ovCard=dv('overall-kpi');
  var ovSc=dv('ov-score');ovSc.textContent=ov.toFixed(1);ovSc.style.color=scoreColor(ov);
  var ovRt=dv('ov-right');var ovLb=dv('ov-lbl');ovLb.textContent='Overall Experience Score / 100 — '+bandText(ov);var ovSm=dv('ov-sum');ovSm.textContent=summary||'Survey summary loading...';
  ovRt.appendChild(ovLb);ovRt.appendChild(ovSm);ovCard.appendChild(ovSc);ovCard.appendChild(ovRt);pg.appendChild(ovCard);
  // Sentiment
  var sentLbl=h('div','section-label');sentLbl.textContent='Overall Sentiment Distribution';pg.appendChild(sentLbl);
  var sentCard=dv('card');var sentBar=dv('sentiment-bar');
  var sp=dv('sent-pos');sp.style.flex=posPct;var sn=dv('sent-neu');sn.style.flex=neuPct;var sg=dv('sent-neg');sg.style.flex=negPct;
  sentBar.appendChild(sp);sentBar.appendChild(sn);sentBar.appendChild(sg);sentCard.appendChild(sentBar);
  var sk=dv('');sk.style.cssText='display:flex;gap:20px;font-size:11px;margin-top:8px;';
  [['Positive',posPct,'var(--pos)'],['Neutral',neuPct,'var(--muted)'],['Negative',negPct,'var(--neg)']].forEach(function(x){var k=dv('');k.style.cssText='display:flex;align-items:center;gap:5px;';var dot=dv('');dot.style.cssText='width:8px;height:8px;border-radius:50%;background:'+x[2]+';flex-shrink:0;';var txt=dv('');txt.textContent=x[0]+' '+x[1].toFixed(1)+'%';txt.style.color=x[2];k.appendChild(dot);k.appendChild(txt);sk.appendChild(k);});
  sentCard.appendChild(sk);pg.appendChild(sentCard);
  // KPIs
  var kLbl=h('div','section-label');kLbl.textContent='Experience Indices';pg.appendChild(kLbl);
  var kGrid=dv('kpi-grid');
  [{l:'Belonging Index',v:bi,c:'#4f7cff',cat:'Culture & Belonging'},{l:'Team Energy Sentiment',v:te,c:'#34d399',cat:'Leadership & Trust'},{l:'Strategy Alignment',v:si,c:'#fbbf24',cat:'Strategy & Alignment'},{l:'Career Equity Index',v:ci,c:'#a78bfa',cat:'Career & Growth'},{l:'Retention Index',v:ri,c:'#ff6b6b',cat:'Retention & Sustainability'}].forEach(function(kpi){
    var card=dv('kpi-card');card.style.setProperty('--kc',kpi.c);
    var kl=dv('kpi-label');kl.textContent=kpi.l;card.appendChild(kl);
    var ks=dv('kpi-score');ks.textContent=kpi.v.toFixed(1);ks.style.color=kpi.c;card.appendChild(ks);
    var kb=dv('kpi-band');kb.textContent=bandText(kpi.v);kb.style.color=kpi.c;card.appendChild(kb);
    var kt=dv('kpi-bar-track');var kf=dv('kpi-bar-fill');kf.style.width=Math.min(kpi.v,100)+'%';kf.style.background=kpi.c;kt.appendChild(kf);card.appendChild(kt);
    var ksub=dv('kpi-sub');ksub.textContent=kpi.cat;card.appendChild(ksub);kGrid.appendChild(card);});
  pg.appendChild(kGrid);
  if(effRows.length){
    var eLbl=h('div','section-label');eLbl.textContent='Category Effectiveness Scores';pg.appendChild(eLbl);
    var eHint=h('div');eHint.style.cssText='font-size:10px;color:var(--muted);margin-bottom:8px;';
    eHint.textContent='Click any row to drill down into questions and responses for that category.';
    pg.appendChild(eHint);
    var eCard=dv('card');var scroll=dv('scroll-y');
    var tbl=document.createElement('table');tbl.className='data-table';
    tbl.style.cssText='border-collapse:collapse;width:100%;';
    var thead=document.createElement('thead');var hr2=document.createElement('tr');
    ['','Category','Responses','Positive %','Negative %','Effectiveness Score','Band'].forEach(function(col){
      var th=document.createElement('th');th.textContent=col;
      if(col===''){th.style.width='28px';}
      hr2.appendChild(th);
    });
    thead.appendChild(hr2);tbl.appendChild(thead);
    var tbody=document.createElement('tbody');
    var detailRows=DB['Detailed Responses']||[];

    effRows.forEach(function(row){
      var catName=val(row,'Category');
      var sc=num(row,'Effectiveness Score (0-100)');

      // ── Main summary row ──
      var tr=document.createElement('tr');
      tr.style.cssText='cursor:pointer;transition:background .15s;';
      tr.onmouseover=function(){this.style.background='rgba(79,124,255,.07)';};
      tr.onmouseout =function(){this.style.background='';};

      // Expand icon cell
      var tdIcon=document.createElement('td');tdIcon.style.cssText='text-align:center;font-size:12px;color:var(--accent);user-select:none;';
      tdIcon.textContent='+';
      tr.appendChild(tdIcon);

      [catName,val(row,'Total Responses'),val(row,'Positive %')+'%',val(row,'Negative %')+'%',sc.toFixed(1)+'/100',val(row,'Effectiveness Band')].forEach(function(v,i){
        var td=document.createElement('td');
        if(i===0){var pill=document.createElement('span');pill.className='cat-pill '+catCls(v);pill.textContent=v;td.appendChild(pill);}
        else if(i===4){td.style.cssText='color:'+scoreColor(sc)+';font-weight:700;font-family:system-ui,sans-serif;';td.textContent=v;}
        else{td.textContent=v;}
        tr.appendChild(td);
      });
      tbody.appendChild(tr);

      // ── Drill-down row (hidden by default) ──
      var drillTr=document.createElement('tr');
      drillTr.style.display='none';
      var drillTd=document.createElement('td');
      drillTd.colSpan=7;
      drillTd.style.cssText='padding:0;background:var(--bg);border-top:none;';

      var drillBuilt=false;

      // Toggle on click
      tr.onclick=function(){
        var isOpen=(drillTr.style.display!=='none');
        if(isOpen){
          drillTr.style.display='none';
          tdIcon.textContent='+';
          tr.style.background='';
        } else {
          // Build drill-down on first open
          if(!drillBuilt){
            drillBuilt=true;
            buildDrillDown(drillTd, catName, detailRows);
          }
          drillTr.style.display='';
          tdIcon.textContent='−';
          tr.style.background='rgba(79,124,255,.05)';
        }
      };

      drillTr.appendChild(drillTd);
      tbody.appendChild(drillTr);
    });

    tbl.appendChild(tbody);scroll.appendChild(tbl);eCard.appendChild(scroll);pg.appendChild(eCard);
  }
}
