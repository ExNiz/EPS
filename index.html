<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LeaderPulse — Leaders Experience Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{--bg:#0d0f14;--surface:#151820;--card:#1c2030;--border:#252a3a;--accent:#4f7cff;--accent3:#34d399;--accent4:#fbbf24;--accent5:#a78bfa;--text:#e8eaf0;--muted:#b0bac8;--pos:#34d399;--neg:#ff6b6b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* PASSWORD */
#pw-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 30% 20%,#1a2a5e33 0%,transparent 60%),#0b1220;}
.pw-card{width:100%;max-width:420px;background:#151820;border:1px solid #252a3a;border-radius:20px;padding:44px 40px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5);}
.pw-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px;}
.pw-logo img{height:40px;object-fit:contain;}
.pw-brand{font-family:system-ui,sans-serif;font-size:24px;font-weight:800;color:#f1f5f9;}
.pw-brand span{color:#4f7cff;}
.pw-lock{font-size:32px;margin-bottom:12px;}
.pw-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#b0bac8;margin-bottom:8px;text-align:left;}
.pw-input{width:100%;background:#1c2030;border:1px solid #252a3a;border-radius:10px;padding:14px 18px;color:white;font-size:16px;font-family:system-ui,-apple-system,sans-serif;text-align:center;letter-spacing:.15em;margin-bottom:14px;outline:none;transition:border-color .2s;}
.pw-input:focus{border-color:#4f7cff;}
.pw-btn{width:100%;background:#4f7cff;color:#fff;border:none;border-radius:10px;padding:14px;font-family:system-ui,sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:all .2s;}
.pw-btn:hover{background:#3d6ae0;transform:translateY(-1px);}
.pw-error{color:#ff6b6b;font-size:12px;margin-top:10px;min-height:18px;}
.pw-footer{margin-top:24px;padding-top:16px;border-top:1px solid #1f2937;font-size:11px;color:#6b7080;}

/* LOADING */
#loading{display:none;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:var(--bg);}
.spin{width:32px;height:32px;border:3px solid #252a3a;border-top-color:#4f7cff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* DASHBOARD */
#dashboard{display:none;height:100vh;flex-direction:column;}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:#0a0c10;border-bottom:2px solid var(--accent);flex-shrink:0;}
.app-logo{display:flex;align-items:center;gap:10px;}
.app-logo img{height:30px;object-fit:contain;}
.app-brand{font-family:system-ui,sans-serif;font-size:18px;font-weight:800;color:#fff;}
.app-brand span{color:#4f7cff;}
.header-right{display:flex;align-items:center;gap:8px;}
.hbadge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.hbadge strong{font-family:system-ui,sans-serif;font-size:14px;font-weight:800;}
.tab-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;gap:2px;}
.tab-btn{all:unset;box-sizing:border-box;display:inline-block;border-bottom:3px solid transparent;padding:13px 22px;font-family:system-ui,-apple-system,sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;margin-bottom:-1px;line-height:1;transition:color .18s,background .18s,border-color .18s;}
.tab-btn:hover{color:#e8eaf0;background:rgba(255,255,255,.04);}
.tab-btn.active{color:#fff;border-bottom:3px solid #4f7cff;font-weight:600;background:rgba(79,124,255,.08);}
.page-wrap{flex:1;overflow-y:auto;padding:20px;}
.page{display:none;}
.page.active{display:block;}
.page-header{margin-bottom:18px;}
.page-title{font-family:system-ui,sans-serif;font-size:22px;font-weight:800;}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:16px 0 8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.scroll-y{overflow-x:auto;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:0;}
.stat-tile{border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;border:1px solid var(--border);}
.stat-tile-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;font-weight:600;}
.stat-tile-val{font-family:system-ui,sans-serif;font-size:52px;font-weight:800;line-height:1;}
.stat-tile-sub{font-size:11px;color:var(--muted);margin-top:8px;}
.overall-kpi{background:linear-gradient(135deg,#1c2030,#0f172a);border:1px solid var(--border);border-radius:14px;padding:24px 28px;display:flex;gap:26px;align-items:center;margin-bottom:0;position:relative;overflow:hidden;}
.overall-kpi::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(79,124,255,.12) 0%,transparent 70%);}
.ov-score{font-family:system-ui,sans-serif;font-size:64px;font-weight:800;line-height:1;flex-shrink:0;}
.ov-right{flex:1;}
.ov-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.ov-sum{font-size:12px;color:var(--text);line-height:1.65;}
.sentiment-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin:8px 0;}
.sent-pos{background:var(--pos);}.sent-neu{background:var(--accent4);}.sent-neg{background:var(--neg);}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:0;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;}
.kpi-score{font-family:system-ui,sans-serif;font-size:34px;font-weight:800;line-height:1;margin-bottom:2px;}
.kpi-band{font-size:11px;font-weight:600;margin-top:3px;}
.kpi-bar-track{height:4px;background:var(--border);border-radius:2px;margin-top:10px;}
.kpi-bar-fill{height:100%;border-radius:2px;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:5px;}
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{background:var(--surface);color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.cat-pill{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;}
.cat-cb,.cat-lt,.cat-sa,.cat-cg,.cat-rs{background:rgba(176,186,200,.12);color:var(--muted);border:1px solid rgba(176,186,200,.2);}
.pain-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;border-left:3px solid var(--neg);}
.strength-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;border-left:3px solid var(--pos);}
.evidence-quote{background:var(--surface);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--muted);font-style:italic;margin:4px 0;line-height:1.55;border-left:2px solid var(--accent);}

.sentiment-dist-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0 4px;}
.sent-good{background:#34d399;}
.sent-fair{background:#fbbf24;}
.sent-needs{background:#ff6b6b;}
.sent-legend{display:flex;gap:14px;font-size:10px;margin-bottom:10px;}
.sent-leg-item{display:flex;align-items:center;gap:4px;}
.kpi-ev-btn{all:unset;font-size:10px;color:var(--accent);cursor:pointer;text-decoration:underline;margin-top:6px;display:inline-block;}
.action-highlight{font-size:12px;background:linear-gradient(135deg,rgba(79,124,255,.15),rgba(79,124,255,.05));border-radius:8px;padding:11px 14px;border-left:3px solid var(--accent);color:var(--text);margin-top:8px;}
.action-highlight-label{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.action-highlight-text{font-size:12px;color:var(--text);line-height:1.6;}
.pct-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.pct-bar-label{font-size:11px;color:var(--muted);width:160px;flex-shrink:0;text-align:right;}
.pct-bar-track{flex:1;height:18px;background:var(--surface);border-radius:3px;overflow:hidden;}
.pct-bar-fill{height:18px;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:#fff;min-width:2px;}
.pct-bar-pct{font-size:11px;font-weight:700;width:40px;flex-shrink:0;}
.ev-drilldown{display:none;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;}
.ev-drilldown.open{display:block;}
.no-pain{font-size:11px;color:var(--pos);background:rgba(52,211,153,.08);border-radius:6px;padding:9px 12px;border-left:2px solid var(--pos);}
.drill-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--accent);background:rgba(79,124,255,.10);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif;transition:background .15s,border-color .15s;}
.drill-btn:hover{background:rgba(79,124,255,.22);border-color:#7a9fff;}
.drill-btn.pos{border-color:var(--pos);background:rgba(52,211,153,.10);color:var(--pos);}
.drill-btn.pos:hover{background:rgba(52,211,153,.22);}
.drill-btn.neg{border-color:var(--neg);background:rgba(255,107,107,.10);color:var(--neg);}
.drill-btn.neg:hover{background:rgba(255,107,107,.22);}
.eff-note{font-size:11px;color:var(--muted);background:var(--surface);border-radius:8px;padding:14px 18px;margin-bottom:12px;border-left:3px solid var(--accent4);line-height:1.75;}
.eff-note code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--accent4);}
.cat-section-label{font-size:10px;font-weight:700;color:var(--accent3);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 6px;display:flex;align-items:center;gap:6px;}
.cat-section-label::before{content:'';display:inline-block;width:3px;height:12px;background:currentColor;border-radius:2px;}
.categories-surveyed{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;padding:14px 16px;background:var(--surface);border-radius:10px;border:1px solid var(--border);}
.cat-surveyed-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;width:100%;}
.dist-question-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.dist-q-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px;}
.dist-q-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;flex:1;}
.dist-q-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dist-q-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;}
.dist-multi-badge{background:rgba(79,124,255,.15);color:var(--accent);border:1px solid rgba(79,124,255,.3);}
.dist-single-badge{background:rgba(52,211,153,.12);color:var(--pos);border:1px solid rgba(52,211,153,.25);}
.dist-cat-pill{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;}
.dist-leaders{font-size:10px;color:var(--muted);}
.dist-bar-wrap{margin-top:14px;}
.dist-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.dist-bar-label{font-size:11px;color:var(--muted);flex:0 0 220px;text-align:right;line-height:1.35;word-break:break-word;}
.dist-bar-track{flex:1;height:22px;background:var(--surface);border-radius:4px;overflow:hidden;position:relative;}
.dist-bar-fill{height:22px;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;transition:width .6s cubic-bezier(.4,0,.2,1);min-width:2px;}
.dist-bar-count{font-size:10px;color:var(--muted);flex:0 0 32px;text-align:right;}
.dist-bar-pct{font-size:11px;font-weight:700;flex:0 0 38px;}
.dist-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.dist-filter-btn{all:unset;box-sizing:border-box;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:var(--card);transition:all .15s;}
.dist-filter-btn:hover,.dist-filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.dist-search{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:12px;font-family:system-ui,sans-serif;outline:none;width:100%;margin-bottom:14px;transition:border-color .2s;}
.dist-search:focus{border-color:var(--accent);}
.dist-section-head{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:6px 0 10px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.dist-empty{font-size:12px;color:var(--muted);text-align:center;padding:40px 0;font-style:italic;}
</style>
</head>

var DB = {};

function $(id){return document.getElementById(id);}
function dv(cls){var e=document.createElement('div');if(cls)e.className=cls;return e;}
function h(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function val(row,col){return(row&&row[col]!=null)?String(row[col]):'';}
function num(row,col){return parseFloat(val(row,col))||0;}
function catCls(cat){if(!cat)return'';var c=cat.toLowerCase();if(c.includes('culture')||c.includes('belong'))return'cat-cb';if(c.includes('career')||c.includes('growth'))return'cat-cg';if(c.includes('leader')||c.includes('trust'))return'cat-lt';if(c.includes('retention')||c.includes('sustain'))return'cat-rs';if(c.includes('strategy')||c.includes('align'))return'cat-sa';return'';}
function scoreColor(v){return v>=65?'var(--pos)':v>=50?'var(--accent4)':'var(--neg)';}
function bandColor(v){return v>=65?'var(--pos)':v>=50?'var(--accent4)':'var(--neg)';}
function bandText(v){return v>=80?'Excellent':v>=65?'Good':v>=50?'Fair':'Needs Attention';}
function sentBand(v){return v>=65?'Good':v>=45?'Fair':'Needs Attention';}
function sentBandColor(v){return v>=65?'var(--pos)':v>=45?'var(--accent4)':'var(--neg)';}
function showTab(name){document.querySelectorAll('.page').forEach(function(p){p.style.display='none';});document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});var pg=$('p-'+name);if(pg)pg.style.display='block';var btn=$('t-'+name);if(btn)btn.classList.add('active');}

function checkPw(){
  var v=$('pw-input').value;
  if(v===PASS){
    $('pw-screen').style.display='none';
    $('loading').style.display='flex';
    setTimeout(loadData,50);
  } else {
    $('pw-error').textContent='Incorrect password. Please try again.';
  }
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});

function loadData(){
  try{
    var binary=atob(EMBEDDED_DATA);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    var wb=XLSX.read(bytes,{type:'array'});
    wb.SheetNames.forEach(function(n){DB[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{defval:''});});
    /* Pre-process: split semi-colon separated responses into individual entries */
    function splitSemicolonSheet(sheetName,respFields){
      if(!DB[sheetName])return;
      var expanded=[];
      DB[sheetName].forEach(function(row){
        var resp='';
        for(var fi=0;fi<respFields.length;fi++){var v=val(row,respFields[fi]);if(v){resp=v;break;}}
        if(resp.indexOf(';')!==-1){
          var parts=resp.split(';').map(function(p){return p.trim();}).filter(Boolean);
          parts.forEach(function(part){
            var newRow={};
            Object.keys(row).forEach(function(k){newRow[k]=row[k];});
            respFields.forEach(function(f){if(row[f]!==undefined)newRow[f]=part;});
            expanded.push(newRow);
          });
        } else {
          expanded.push(row);
        }
      });
      DB[sheetName]=expanded;
    }
    splitSemicolonSheet('Detailed Responses',['Response','Original_Response']);
    splitSemicolonSheet('Pain Point Evidence',['Response','Evidence']);
    splitSemicolonSheet('Strengths Evidence',['Response','Evidence']);
    splitSemicolonSheet('Category Evidence',['Response','Evidence']);
    splitSemicolonSheet('Suggestion Evidence',['Response','Evidence','Suggestion']);
    buildExec(); buildCategory(); buildStrengths(); buildPain(); buildSuggestions(); buildDist(); buildFormulas();
    $('loading').style.display='none';
    $('dashboard').style.display='flex';
    $('dashboard').style.flexDirection='column';
    showTab('exec');
  } catch(err){
    $('load-error').textContent='Error: '+err.message;
    $('load-error').style.display='block';
    $('loading').querySelector('.spin').style.display='none';
  }
}

/* ── CHANGE 3: Smart drill-down — % split for option-based, quotes for open-ended ── */
/* ══════════════════════════════════════════════════════
   SHARED EVIDENCE RENDERER
   Deduplicates responses. Shows % bar chart when repeats
   exist, otherwise shows unique quotes only.
   accentColor: CSS var string for bar/border colour.
══════════════════════════════════════════════════════ */
function renderEvidenceRows(evArray, container, accentColor, textField){
  if(!evArray||!evArray.length)return;
  accentColor=accentColor||'var(--accent)';
  textField=textField||'Evidence';

  /* Collect text values, respecting multiple field name options */
  function getText(row){
    return (val(row,textField)||val(row,'Evidence')||val(row,'Response')||
            val(row,'Suggestion')||'').trim();
  }

  /* Group by question if Question field exists */
  var byQ={};var qOrder=[];
  evArray.forEach(function(ev){
    var q=(val(ev,'Question')||val(ev,'Survey Question')||'').trim()||'__noq__';
    if(!byQ[q]){byQ[q]=[];qOrder.push(q);}
    byQ[q].push(ev);
  });

  qOrder.forEach(function(q){
    var rows=byQ[q];
    var texts=rows.map(getText).filter(Boolean);

    /* Count duplicates */
    var counts={};var order=[];
    texts.forEach(function(t){
      if(!counts[t]){counts[t]=0;order.push(t);}
      counts[t]++;
    });
    var uniqueTexts=order;
    var totalMentions=texts.length;
    var hasDupes=uniqueTexts.some(function(t){return counts[t]>1;});

    /* Decide: bar chart when significant repetition exists.
       Primary: duplicate ratio > 20% (i.e. repeats are common, not noise).
       Secondary: ≤12 unique options with any repeats.
       For bar chart, only show options that appear ≥2 times OR are the top option —
       this filters out one-off free-text write-ins from multi-select questions. */
    var dupeRatio=(totalMentions-uniqueTexts.length)/Math.max(totalMentions,1);
    var useBar=dupeRatio>=0.2||(uniqueTexts.length<=12&&hasDupes);

    /* Question label (skip if no question or all same bucket) */
    if(q!=='__noq__'&&qOrder.length>1){
      var qLbl=dv('');
      qLbl.style.cssText='font-size:10px;font-weight:700;background:var(--surface);'+
        'border-radius:5px;padding:6px 10px;margin-bottom:6px;margin-top:8px;'+
        'border-left:3px solid var(--accent4);line-height:1.5;color:var(--accent4);';
      qLbl.textContent='Q: '+q;
      container.appendChild(qLbl);
    }

    if(useBar){
      /* % split bar chart — sorted by count descending */
      var sorted=uniqueTexts.slice().sort(function(a,b){return counts[b]-counts[a];});
      var maxCnt=counts[sorted[0]]||1;
      sorted.forEach(function(text){
        var cnt=counts[text];
        /* Skip one-off free-text write-ins: appears only once AND longer than 60 chars
           AND not the most-common response */
        if(cnt===1&&text.length>60&&cnt<maxCnt)return;
        var pct=Math.round(cnt/totalMentions*100);
        var row=dv('pct-bar-row');
        /* Label: show full text, wrap if needed */
        var lbl=dv('pct-bar-label');
        lbl.title=text;
        lbl.textContent=text;
        lbl.style.cssText='font-size:11px;color:var(--muted);width:260px;flex-shrink:0;text-align:right;line-height:1.4;word-break:break-word;white-space:normal;';
        var track=dv('pct-bar-track');
        track.style.cssText='flex:0 0 160px;height:18px;background:var(--surface);border-radius:3px;overflow:hidden;';
        var fill=dv('pct-bar-fill');
        fill.style.cssText='background:'+accentColor+';width:'+pct+'%;transition:width .5s ease;';
        if(pct>12)fill.textContent=cnt;
        track.appendChild(fill);
        var pctLbl=dv('pct-bar-pct');
        pctLbl.style.color=accentColor;
        pctLbl.textContent=pct+'%';
        row.appendChild(lbl);row.appendChild(track);row.appendChild(pctLbl);
        container.appendChild(row);
      });
      /* Show total mentions note if multi-select */
      if(totalMentions>evArray.length){
        var note=dv('');
        note.style.cssText='font-size:10px;color:var(--muted);margin-top:4px;font-style:italic;';
        note.textContent=totalMentions+' total selections from '+evArray.length+' responses';
        container.appendChild(note);
      }
    } else {
      /* Unique quotes only — never repeat same text */
      var shown=new Set();
      uniqueTexts.forEach(function(text){
        if(shown.has(text))return;
        shown.add(text);
        var qe=dv('evidence-quote');

/* ── Response Distribution ── */
function buildDist(){
  var pg=$('p-dist');pg.innerHTML='';
  var detRows=DB['Detailed Responses']||[];

  /* STEP 1: Group rows by question */
  var qMap={};
  detRows.forEach(function(r){
    var q=(val(r,'Question')||'').trim();
    var respRaw=(val(r,'Response')||'').trim();
    var cat=(val(r,'Category')||'').trim();
    var sent=(val(r,'Sentiment')||'').trim();
    if(!q||!respRaw)return;
    if(!qMap[q])qMap[q]={cat:cat,isMulti:false,totalLeaders:0,optionCounts:{},sentMap:{},optOrder:[]};
    var parts=respRaw.split(';').map(function(p){return p.trim();}).filter(Boolean);
    if(parts.length>1)qMap[q].isMulti=true;
    qMap[q].totalLeaders++;
    parts.forEach(function(part){
      if(!qMap[q].optionCounts[part]){qMap[q].optionCounts[part]=0;qMap[q].optOrder.push(part);}
      qMap[q].optionCounts[part]++;
      if(!qMap[q].sentMap[part])qMap[q].sentMap[part]=[];
      qMap[q].sentMap[part].push(sent);
    });
  });

  /* STEP 2: Classify each question */
  var catOrder=['Culture & Belonging','Culture & Belongingness','Career & Growth','Leadership & Trust','Retention & Sustainability','Strategy & Alignment'];

  function classifyQ(q,data){
    var opts=Object.keys(data.optionCounts).map(function(o){return o.toLowerCase();});
    var agreePhrases=['strongly agree','strongly disagree','i agree','i disagree','i strongly agree','i strongly disagree','i am neutral','neutral'];
    var matchAgreement=opts.filter(function(o){return agreePhrases.some(function(p){return o.includes(p);});}).length;
    if(matchAgreement>=2)return'agreement';
    var hasYes=opts.some(function(o){return o==='yes'||o.startsWith('yes');});
    var hasNo=opts.some(function(o){return o==='no'||o.startsWith('no');});
    if(hasYes&&hasNo&&opts.length<=4)return'yesno';
    var totalMentions=Object.values(data.optionCounts).reduce(function(a,b){return a+b;},0);
    var avgLen=Object.keys(data.optionCounts).reduce(function(s,o){return s+o.length;},0)/Math.max(Object.keys(data.optionCounts).length,1);
    if(Object.keys(data.optionCounts).length>=2&&Object.keys(data.optionCounts).length<=20&&avgLen<130&&data.totalLeaders>=3&&(data.isMulti||totalMentions>data.totalLeaders*0.25))return'multi';
    return null;
  }

  var agreementByCat={};var yesnoQs=[];var multiQs=[];
  Object.keys(qMap).forEach(function(q){
    var data=qMap[q];var type=classifyQ(q,data);
    if(type==='agreement'){var c=data.cat||'Other';if(!agreementByCat[c])agreementByCat[c]=[];agreementByCat[c].push({q:q,data:data});}
    else if(type==='yesno')yesnoQs.push({q:q,data:data});
    else if(type==='multi')multiQs.push({q:q,data:data});
  });

  /* STEP 3: Header + search */
  var hdr2=dv('page-header');var pt2=h('div','page-title');pt2.textContent='Response Distribution';var ps2=h('div','page-sub');ps2.textContent='Agreement questions grouped by category with diverging bars. Yes/No and multi-choice shown separately.';hdr2.appendChild(pt2);hdr2.appendChild(ps2);pg.appendChild(hdr2);
  var search=document.createElement('input');search.className='dist-search';search.placeholder='\uD83D\uDD0D  Search questions or options...';pg.appendChild(search);
  var cardsWrap=dv('');pg.appendChild(cardsWrap);

  /* Colour helpers */
  function agreementColor(opt){
    var o=opt.toLowerCase();
    if(o.includes('strongly agree'))return'#34d399';
    if(o.includes('agree'))return'#6ee7b7';
    if(o.includes('neutral')||o.includes('neither'))return'#fbbf24';
    if(o.includes('strongly disagree'))return'#ff6b6b';
    if(o.includes('disagree'))return'#fca5a5';
    return'#94a3b8';
  }
  function shortLabel(opt){
    var o=opt.trim();
    var m=o.match(/^I\s+(Strongly\s+)?(Agree|Disagree|am Neutral|Neutral)\b/i);
    if(m)return(m[1]?m[1].trim()+' ':'')+m[2];
    if(/^strongly agree/i.test(o))return'Strongly Agree';
    if(/^agree/i.test(o))return'Agree';
    if(/^neutral/i.test(o))return'Neutral';
    if(/^strongly disagree/i.test(o))return'Strongly Disagree';
    if(/^disagree/i.test(o))return'Disagree';
    return o.length>28?o.slice(0,26)+'\u2026':o;
  }
  function yesnoColor(opt){var o=opt.toLowerCase();if(o.startsWith('yes'))return'#34d399';if(o.startsWith('no'))return'#ff6b6b';return'#fbbf24';}

    cardsWrap.innerHTML='';
    var searchTerm=(search.value||'').toLowerCase().trim();
    function qMatches(q,data){if(!searchTerm)return true;if(q.toLowerCase().includes(searchTerm))return true;return Object.keys(data.optionCounts).some(function(o){return o.toLowerCase().includes(searchTerm);});}
    var shown=0;
    /* Agreement groups */
    var allCats=catOrder.concat(Object.keys(agreementByCat).filter(function(c){return catOrder.indexOf(c)===-1;}));
    allCats.forEach(function(cat){
      var qs=(agreementByCat[cat]||[]).filter(function(item){return qMatches(item.q,item.data);});
      if(qs.length){renderAgreementGroup(cat,qs);shown+=qs.length;}
    });
    /* Yes/No */
    var fYN=yesnoQs.filter(function(item){return qMatches(item.q,item.data);});
    if(fYN.length){var ynH=dv('');ynH.style.cssText='font-size:11px;font-weight:700;color:var(--pos);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 8px;padding:8px 12px;background:rgba(52,211,153,.08);border-radius:6px;border-left:3px solid var(--pos);';ynH.textContent='Yes / No Questions';cardsWrap.appendChild(ynH);fYN.forEach(function(item){renderYesNoCard(item);shown++;});}
    /* Multi */
    var fM=multiQs.filter(function(item){return qMatches(item.q,item.data);});
    if(fM.length){var mH=dv('');mH.style.cssText='font-size:11px;font-weight:700;color:var(--accent5);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 8px;padding:8px 12px;background:rgba(167,139,250,.08);border-radius:6px;border-left:3px solid var(--accent5);';mH.textContent='Multiple Choice Questions';cardsWrap.appendChild(mH);fM.forEach(function(item){renderMultiCard(item);shown++;});}
    if(!shown){var empty=dv('dist-empty');empty.textContent='No questions match your search.';cardsWrap.appendChild(empty);}
  }

  var searchTimer;
  search.oninput=function(){clearTimeout(searchTimer);searchTimer=setTimeout(renderAll,200);};
  renderAll();
}

function buildFormulas(){
  var pg=$('p-form');pg.innerHTML='';
  var hdr=dv('page-header');var pt=h('div','page-title');pt.textContent='Score Formulas';var ps=h('div','page-sub');ps.textContent='How effectiveness scores and indices are calculated';hdr.appendChild(pt);hdr.appendChild(ps);pg.appendChild(hdr);
  var card=dv('card');
  var effNote=dv('eff-note');
  effNote.innerHTML=
    '<strong style="color:var(--accent4)">How the Effectiveness Score is calculated</strong> — it is a <em>weighted composite of three signals</em>, not simply the positive sentiment %:<br><br>'+
    '<strong style="color:var(--accent4)">① Sentiment Score</strong> (always present)<br>'+
    '<code style="background:#0d0f14;padding:2px 6px;border-radius:4px;font-size:11px;">( (Positive% − Negative%) + 100 ) ÷ 2</code><br>'+
    '<span style="color:var(--muted);font-size:10px;">Centres the net sentiment on a 0–100 scale. Example: 49% pos, 27% neg → ((49−27)+100)÷2 = <strong>61.0</strong></span><br><br>'+
    '<strong style="color:var(--accent4)">② Rating Score</strong> (only if "On a scale of…" questions exist in that category)<br>'+
    '<code style="background:#0d0f14;padding:2px 6px;border-radius:4px;font-size:11px;">( Average numeric rating ÷ Max scale ) × 100</code><br>'+
    '<span style="color:var(--muted);font-size:10px;">Scale auto-detected: ≤5 → out of 5, else out of 10. Scaled to 0–100.</span><br><br>'+
    '<strong style="color:var(--accent4)">③ Engagement Score</strong> (always present)<br>'+
    '<code style="background:#0d0f14;padding:2px 6px;border-radius:4px;font-size:11px;">( Suggestion responses in category ÷ Total responses in category ) × 100</code><br>'+
    '<span style="color:var(--muted);font-size:10px;">Measures how actively leaders contributed improvement ideas.</span><br><br>'+
    '<strong style="color:var(--accent4)">Final weighted composite:</strong><br>'+
    '<span style="color:var(--muted);font-size:10px;"><strong style="color:var(--text)">Without ratings:</strong> &nbsp;Score = (Sentiment × 80%) + (Engagement × 20%)</span><br>'+
    '<span style="color:var(--muted);font-size:10px;"><strong style="color:var(--text)">With ratings:&nbsp;&nbsp;&nbsp;&nbsp;</strong> Score = (Sentiment × 50%) + (Rating × 30%) + (Engagement × 20%)</span><br><br>'+
    '<span style="color:var(--accent4);font-size:10px;">⚡ This is why a category with 49% positive sentiment can score 48.6 — the Sentiment Score first becomes 61.0 via the net formula, then engagement weight pulls it down to the final composite. The Overall Experience Score is the mean of all five category scores.</span>';
  card.appendChild(effNote);pg.appendChild(card);
}

</script>
